# Generated by Gemini

name: Build Emscripten and Deploy to Pages

on:
  push:
    branches:
      - main # Triggers the build whenever you push to the main branch
  workflow_dispatch: # Allows you to manually trigger this run from the Actions tab

# Set permissions required to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments from messing with each other
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Install Emscripten using the official community action
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      # 2. Change to the subdirectory and execute build.sh
      - name: Build Wasm Module
        run: |
          chmod +x ./build.sh
          ./build.sh
        working-directory: ./connect-four-ai-revamp

      # 3. Create a nested staging directory so everything sits under /c4ai
      - name: Prepare Staging Directory for Pages
        run: |
          mkdir -p staging/c4ai
          
          # Copy files into the /c4ai subfolder
          cp -r connect-four-ai-revamp/bin staging/c4ai/
          cp connect-four-ai-revamp/index.html staging/c4ai/
          cp connect-four-ai-revamp/app.js staging/c4ai/
          cp connect-four-ai-revamp/index.js staging/c4ai/
          cp connect-four-ai-revamp/main.css staging/c4ai/

          # Create an automatic root redirect file to bounce users to /c4ai/
          echo '<meta http-equiv="refresh" content="0; URL=./c4ai/">' > staging/index.html

      # 4. Upload the staging folder as a Pages artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./staging

      # 5. Deploy the bundle directly to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
